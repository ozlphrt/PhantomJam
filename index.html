<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="3D Phantom Jam Simulation - Watch traffic waves and intersection bottleneck dynamics with Three.js WebGL and IDM physics." />
    <title>3D Phantom Jam with Intersection Crossing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">

      <main id="main">
        <div id="simulation-area">
          <canvas id="road-canvas"></canvas>
        </div>

        <button id="sidebar-trigger" class="btn-sidebar-trigger">⚙</button>

        <aside id="sidebar">
          <div class="sidebar-header">
            <div class="sidebar-header-row">
              <h1>Phantom Jam 3D</h1>
              <button id="btn-close-sidebar" class="btn-close-sidebar">✕</button>
            </div>
            <span class="subtitle">Figure-8 highway · IDM physics · Treiber 2000</span>
          </div>

          <section class="panel" id="stats-panel">
            <h2>Simulation Stats</h2>
            <div class="stats-grid">
              <div class="stat-badge" id="stat-cars">
                <span class="stat-label">Vehicles</span>
                <span class="stat-value" id="val-cars">—</span>
              </div>
              <div class="stat-badge" id="stat-flow">
                <span class="stat-label">Avg Speed</span>
                <span class="stat-value" id="val-speed">—</span>
              </div>
              <div class="stat-badge jam-indicator" id="stat-jams">
                <span class="stat-label">Braking</span>
                <span class="stat-value" id="val-jams">0</span>
              </div>
              <div class="stat-badge" id="stat-fps">
                <span class="stat-label">FPS</span>
                <span class="stat-value" id="val-fps">—</span>
              </div>
            </div>
          </section>

          <section class="panel" id="controls-panel">
            <h2>Parameters</h2>

            <div class="control-group">
              <label for="ctrl-count">Vehicle count <span class="val-display" id="disp-count">150</span></label>
              <input type="range" id="ctrl-count" min="20" max="400" value="150" step="1" />
            </div>

            <div class="control-group">
              <label for="ctrl-speed">Sim speed <span class="val-display" id="disp-speed">1×</span></label>
              <input type="range" id="ctrl-speed" min="0.25" max="5" value="1" step="0.25" />
            </div>

            <div class="btn-row">
              <button id="btn-pause" class="btn btn-primary">⏸ Pause</button>
              <button id="btn-reset" class="btn btn-secondary">↺ Reset</button>
              <button id="btn-jam" class="btn btn-jam">⚡ Trigger Jam</button>
            </div>
          </section>
        </aside>

        <button id="camera-cycle-btn" class="btn-camera-cycle">
          <span class="cam-icon">📹</span>
          <span id="cam-active-name" class="cam-label">Jam Cam</span>
        </button>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
